services:
  fashion-factory-analytics:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "9090:9090"
    environment:
      NODE_ENV: production
      PORT: 9090
      SERVE_FRONTEND: "true"
      FRONTEND_DIST_DIR: ../../frontend/dist
      FIRST_PARTY_ANALYTICS_DIR: /data/first-party-analytics
      FRONTEND_ORIGIN: http://127.0.0.1:9090
      FIRST_PARTY_ALLOWED_ORIGINS: http://127.0.0.1:9090,http://localhost:9090,https://fashionfactory.jiocommerce.io
      FIRST_PARTY_SOURCE_URL: https://fashionfactory.jiocommerce.io/ext/fynd-n-go/app/selfcheckout/?_ds=2790
      FIRST_PARTY_STREAM_URL: https://fashionfactory.jiocommerce.io
      FIRST_PARTY_DS: "2790"
      FIRST_PARTY_PROPERTY_ID: "538449109"
      FIRST_PARTY_SOURCE_NAME: Fashion Factory (Companion App Prod)
      FIRST_PARTY_MEASUREMENT_ID: G-MYZM2V20D9
      FIRST_PARTY_STREAM_ID: "14914518095"
      FIRST_PARTY_TIMEZONE: Asia/Kolkata
      FIRST_PARTY_CURRENCY: INR
    volumes:
      - fashion_factory_analytics_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  fashion_factory_analytics_data:
