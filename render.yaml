services:
  - type: web
    name: fashion-factory-kiosk-analytics
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    disk:
      name: fashion-factory-analytics-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST_DIR
        value: ../../frontend/dist
      - key: FIRST_PARTY_ANALYTICS_DIR
        value: /data/first-party-analytics
      - key: FIRST_PARTY_ALLOWED_ORIGINS
        value: https://fashionfactory.jiocommerce.io
      - key: FIRST_PARTY_SOURCE_URL
        value: https://fashionfactory.jiocommerce.io/ext/fynd-n-go/app/selfcheckout/?_ds=2790
      - key: FIRST_PARTY_STREAM_URL
        value: https://fashionfactory.jiocommerce.io
      - key: FIRST_PARTY_DS
        value: "2790"
      - key: FIRST_PARTY_PROPERTY_ID
        value: "538449109"
      - key: FIRST_PARTY_SOURCE_NAME
        value: Fashion Factory (Companion App Prod)
      - key: FIRST_PARTY_MEASUREMENT_ID
        value: G-MYZM2V20D9
      - key: FIRST_PARTY_STREAM_ID
        value: "14914518095"
      - key: FIRST_PARTY_TIMEZONE
        value: Asia/Kolkata
      - key: FIRST_PARTY_CURRENCY
        value: INR
